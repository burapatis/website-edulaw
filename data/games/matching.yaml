  - id: quiz
    term: "แบบทดสอบ"
    match: "เครื่องมือทบทวนความเข้าใจเบื้องต้นหลังการเรียนรู้"
    explanation: "ใช้ทบทวนความเข้าใจหลังอ่านสรุปหรือคู่มือ ไม่ใช่การวินิจฉัยข้อกฎหมาย"
