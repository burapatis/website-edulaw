{{- $law := .law -}}
{{- $href := .href | default (partial "iu.html" (printf "laws/%s/" $law.id)) -}}
<a class="law-card law-card--{{ $law.category }}" href="{{ $href }}">
  <div class="law-card-top">
    <span class="law-tag{{ if ne $law.status "บังคับใช้" }} is-draft{{ end }}">{{ $law.type }}</span>
    <span class="law-year">{{ index (split $law.year "·") 0 }}</span>
  </div>
  <h3>{{ $law.title }}</h3>
  <p class="law-summary">{{ $law.summary }}</p>
  <div class="law-card-foot">
    <span class="agency">{{ $law.agency }}</span>
    <span class="read-more">อ่านสาระสำคัญ →</span>
  </div>
</a>
