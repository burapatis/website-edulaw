questions:
  - id: q001
    category: constitution
    audience: "ผู้สนใจทั่วไป"
    difficulty: "พื้นฐาน"
    question: "รัฐธรรมนูญแห่งราชอาณาจักรไทย พ.ศ. 2560 กำหนดให้รัฐต้องจัดการศึกษาโดยไม่เก็บค่าใช้จ่ายเป็นเวลากี่ปี (มาตรา 54)"
    choices:
      - "9 ปี"
      - "12 ปี"
      - "15 ปี"
      - "6 ปี"
    answer: 1
    explanation: "มาตรา 54 กำหนดให้รัฐต้องดำเนินการให้เด็กทุกคนได้รับการศึกษาเป็นเวลา 12 ปี ตั้งแต่ก่อนวัยเรียนจนจบการศึกษาภาคบังคับ โดยไม่เก็บค่าใช้จ่าย"
    related_law_id: const-2560
    related_law_title: "รัฐธรรมนูญแห่งราชอาณาจักรไทย พ.ศ. 2560"
    related_topics: []
  - id: q002
    category: constitution
    audience: "ผู้สนใจทั่วไป"
    difficulty: "พื้นฐาน"
    question: "มาตราใดของรัฐธรรมนูญ 2560 เป็นฐานที่มาของ “กฎหมายว่าด้วยการศึกษาแห่งชาติ”"
    choices:
      - "มาตรา 40"
      - "มาตรา 54"
      - "มาตรา 77"
      - "มาตรา 112"
    answer: 1
    explanation: "มาตรา 54 กำหนดให้ต้องมีกฎหมายว่าด้วยการศึกษาแห่งชาติ ซึ่งต้องมีแผนการศึกษาแห่งชาติประกอบ"
    related_law_id: const-2560
    related_law_title: "รัฐธรรมนูญแห่งราชอาณาจักรไทย พ.ศ. 2560"
