# ข้อมูลเกมจับคู่คำศัพท์กฎหมายการศึกษา
# ใช้ถ้อยคำกว้าง ปลอดภัย เพื่อการเรียนรู้เบื้องต้น — ไม่สรุปข้อเท็จจริงทางกฎหมายเฉพาะกรณี
#
# โครงสร้างของแต่ละรายการ:
#   id            : รหัสไม่ซ้ำกัน (ใช้ภายในเกมเพื่อจับคู่)
#   term          : คำสำคัญที่ต้องการให้ผู้เล่นจดจำ
#   match         : ความหมายเบื้องต้นแบบกว้าง ๆ (ไม่ใช่คำนิยามทางกฎหมายฉบับเต็ม)
#   explanation   : คำอธิบายเสริมสั้น ๆ เมื่อจับคู่ถูก
#   category      : กลุ่มของคำศัพท์ (เพื่อจัดระเบียบ)
#   related_url   : ลิงก์อ่านต่อ "แบบสัมพัทธ์กับ baseURL" (ไม่ต้องใส่ /website-edulaw/)
#                   ตัวอย่าง: laws/ , search/ , guides/ , quiz/ , about/source-policy/
#   related_label : ข้อความปุ่ม/ลิงก์อ่านต่อ

items:
  - id: edu-law
    term: "กฎหมายการศึกษา"
    match: "กฎหมายหรือเอกสารทางกฎหมายที่เกี่ยวข้องกับการจัดการศึกษา"
    explanation: "เป็นคำกว้าง ๆ ครอบคลุมกฎหมายหลายระดับที่เกี่ยวข้องกับการจัดการศึกษา ดูตัวอย่างได้ในคลังกฎหมาย"
    category: "พื้นฐาน"
    related_url: "laws/"
    related_label: "ไปที่คลังกฎหมาย"

  - id: official-source
    term: "แหล่งข้อมูลทางการ"
    match: "แหล่งข้อมูลจากราชกิจจานุเบกษา หน่วยงานรัฐ หรือหน่วยงานเจ้าของเรื่อง"
    explanation: "ก่อนนำข้อมูลไปใช้อ้างอิง ควรตรวจสอบจากแหล่งทางการเสมอ"
    category: "แหล่งข้อมูล"
    related_url: "about/source-policy/"
    related_label: "อ่านนโยบายแหล่งข้อมูล"

  - id: compulsory-education
    term: "การศึกษาภาคบังคับ"
    match: "หัวข้อกฎหมายที่เกี่ยวข้องกับหน้าที่และสิทธิในการศึกษาตามที่กฎหมายกำหนด"
    explanation: "เป็นหัวข้อพื้นฐานที่ครู ผู้ปกครอง และผู้สนใจมักต้องทำความเข้าใจ"
    category: "สิทธิและหน้าที่"
    related_url: "guides/"
    related_label: "อ่านคู่มือพื้นฐาน"

  - id: teacher-profession
    term: "วิชาชีพครู"
    match: "หัวข้อที่เกี่ยวข้องกับมาตรฐาน ใบอนุญาต และจรรยาบรรณของผู้ประกอบวิชาชีพ"
    explanation: "เป็นกลุ่มเรื่องที่เกี่ยวข้องกับครูและบุคลากรทางการศึกษาโดยตรง"
    category: "วิชาชีพ"
    related_url: "laws/?cat=personnel"
    related_label: "ดูหมวดครูและบุคลากร"

  - id: law-summary
    term: "สรุปกฎหมาย"
    match: "คำอธิบายเพื่อช่วยเข้าใจเบื้องต้น ไม่ใช่ตัวบทกฎหมายทางการ"
    explanation: "สรุปช่วยให้เริ่มต้นเข้าใจได้ง่ายขึ้น แต่ควรอ่านตัวบทฉบับทางการก่อนใช้อ้างอิง"
    category: "การเรียนรู้"
    related_url: "guides/"
    related_label: "อ่านคู่มือและบทความ"

  - id: last-checked
    term: "วันที่ตรวจสอบข้อมูล"
