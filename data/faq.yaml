# คำถามที่พบบ่อย (FAQ) — แหล่งข้อมูลเดียวสำหรับทั้งหน้าเว็บและ JSON-LD FAQPage
# answer ใช้ถ้อยคำปลอดภัยเพื่อการเรียนรู้ ไม่ใช่คำปรึกษากฎหมายเฉพาะกรณี
# links (ไม่บังคับ) แสดงเป็นลิงก์ "อ่านต่อ" ใต้คำตอบ; url เป็นเส้นทางสัมพัทธ์กับ baseURL หรือ URL เต็มภายนอก
#
# group (ไม่บังคับ) ใช้จัดกลุ่มหัวข้อเพื่อการอ่านในหน้าเว็บเท่านั้น — เป็นการจัดวาง (presentation)
#   ไม่ใช่ taxonomy term จริง และไม่กระทบ /audiences/ หรือ JSON-LD FAQPage
# ทุกคำตอบต้องสรุปจากเนื้อหาที่เผยแพร่และมีแหล่งอ้างอิงบนเว็บไซต์นี้แล้วเท่านั้น (หน้ากฎหมาย/คู่มือ)

items:
  # ===== กลุ่มที่ 1: พื้นฐานกฎหมายการศึกษาและการใช้เว็บไซต์ =====
  - group: "พื้นฐานกฎหมายการศึกษาและการใช้เว็บไซต์"
    question: "กฎหมายการศึกษาแห่งชาติ คืออะไร?"
    answer: "เป็นกฎหมายแม่บทที่กำหนดหลักการ จุดมุ่งหมาย และโครงสร้างการจัดการศึกษาทั้งระบบของประเทศ ปัจจุบันบังคับใช้ตามพระราชบัญญัติการศึกษาแห่งชาติ พ.ศ. 2542 และฉบับแก้ไขเพิ่มเติม"
    links:
      - label: "พ.ร.บ.การศึกษาแห่งชาติ พ.ศ. 2542"
        url: "laws/nea-2542/"

  - group: "พื้นฐานกฎหมายการศึกษาและการใช้เว็บไซต์"
    question: "เว็บไซต์นี้รวบรวมกฎหมายได้ครบทุกฉบับหรือไม่?"
    answer: "ไม่ครับ คลังนี้คัดเลือกกฎหมายและระเบียบที่น่าสนใจและใช้งานบ่อยให้มากที่สุดเท่าที่จะทำได้ ยังมีกฎหมายอื่น ๆ ที่ไม่ได้รวมไว้ ควรตรวจสอบจากแหล่งทางการเพิ่มเติมเมื่อต้องใช้อ้างอิงจริง"

  - group: "พื้นฐานกฎหมายการศึกษาและการใช้เว็บไซต์"
    question: "จะค้นหากฎหมายที่ต้องการได้อย่างไร?"
    answer: "ไปที่หน้าคลังกฎหมาย แล้วใช้การค้นหาหรือเลือกหมวดหมู่ที่เกี่ยวข้อง เช่น ครูและบุคลากร อุดมศึกษา หรือคุ้มครองเด็ก"
    links:
      - label: "คลังกฎหมาย"
        url: "laws/"

  - group: "พื้นฐานกฎหมายการศึกษาและการใช้เว็บไซต์"
    question: "เนื้อหาในเว็บไซต์นี้ใช้อ้างอิงทางกฎหมายได้หรือไม่?"
    answer: "เนื้อหาเป็นการสรุปเพื่อการเรียนรู้ ไม่ใช่คำปรึกษาทางกฎหมาย ควรตรวจสอบฉบับเต็มจากราชกิจจานุเบกษา หรือหน่วยงานที่รับผิดชอบก่อนนำไปใช้งานจริง"
    links:
      - label: "ราชกิจจานุเบกษา"
        url: "https://ratchakitcha.soc.go.th"

  - group: "พื้นฐานกฎหมายการศึกษาและการใช้เว็บไซต์"
    question: "จะตรวจสอบว่ากฎหมายมาจากแหล่งทางการจริงได้อย่างไร?"
    answer: "ควรยึดเอกสารจากแหล่งทางการเป็นหลัก เช่น ราชกิจจานุเบกษา เว็บไซต์ของหน่วยงานที่รับผิดชอบ หรือสำนักงานคณะกรรมการกฤษฎีกา และตรวจสอบว่าเป็นฉบับล่าสุดที่รวมการแก้ไขเพิ่มเติมแล้ว คู่มือในเว็บไซต์นี้มีขั้นตอนการตรวจสอบแบบละเอียด"
    links:
      - label: "คู่มือ: วิธีตรวจสอบแหล่งข้อมูลกฎหมายจากแหล่งทางการ"
        url: "guides/official-source-checking/"

  # ===== กลุ่มที่ 2: คำถามสำหรับผู้ปกครองและนักเรียน =====
  - group: "คำถามสำหรับผู้ปกครองและนักเรียน"
    question: "เด็กมีสิทธิเรียนฟรีกี่ปี?"
    answer: "ตามรัฐธรรมนูญและกฎหมายการศึกษา รัฐต้องจัดให้เด็กได้รับการศึกษาอย่างมีคุณภาพเป็นเวลา 12 ปี โดยไม่เก็บค่าใช้จ่าย ในขณะที่การศึกษาภาคบังคับกำหนดไว้ 9 ปี"
    links:
      - label: "รัฐธรรมนูญ 2560 (หมวดสิทธิด้านการศึกษา)"
        url: "laws/const-2560/"
      - label: "พ.ร.บ.การศึกษาแห่งชาติ พ.ศ. 2542"
        url: "laws/nea-2542/"

  - group: "คำถามสำหรับผู้ปกครองและนักเรียน"
    question: "การศึกษาภาคบังคับคืออะไร และบังคับถึงอายุเท่าใด?"
    answer: "การศึกษาภาคบังคับคือช่วงที่กฎหมายกำหนดให้ผู้ปกครองต้องส่งเด็กเข้าเรียน โดยตามพระราชบัญญัติการศึกษาภาคบังคับ พ.ศ. 2545 ผู้ปกครองต้องส่งเด็กที่มีอายุย่างเข้าปีที่ 7 เข้าเรียนจนอายุย่างเข้าปีที่ 16 หรือจนจบการศึกษาภาคบังคับ และมีบทลงโทษหากไม่ส่งเด็กเข้าเรียนโดยไม่มีเหตุอันสมควร"
    links:
      - label: "พ.ร.บ.การศึกษาภาคบังคับ พ.ศ. 2545"
        url: "laws/compulsory-2545/"
      - label: "คู่มือ: การศึกษาภาคบังคับ ประเด็นพื้นฐานที่ควรรู้"
        url: "guides/compulsory-education-basics/"

  - group: "คำถามสำหรับผู้ปกครองและนักเรียน"
    question: "โรงเรียนนับอายุเด็กเข้าเรียนชั้น ป.1 อย่างไร?"
    answer: "ตามกฎกระทรวงกำหนดหลักเกณฑ์และวิธีการนับอายุเด็กเพื่อเข้ารับการศึกษาภาคบังคับ พ.ศ. 2545 ใช้วิธีนับอายุเด็กถึงวันที่ 16 พฤษภาคมของปีการศึกษานั้น เป็นเกณฑ์อ้างอิงให้โรงเรียนใช้ในการรับเด็กเข้าเรียนชั้นประถมศึกษาปีที่ 1"
    links:
      - label: "กฎกระทรวงการนับอายุเด็กเพื่อเข้ารับการศึกษาภาคบังคับ พ.ศ. 2545"
        url: "laws/age-counting-2545/"

  - group: "คำถามสำหรับผู้ปกครองและนักเรียน"
    question: "ถ้าลูกถูกกลั่นแกล้ง (bullying) ในโรงเรียน มีกฎหมายคุ้มครองอย่างไร?"
    answer: "ระเบียบกระทรวงศึกษาธิการว่าด้วยการป้องกันและแก้ไขปัญหาการกลั่นแกล้งในโรงเรียน พ.ศ. 2566 กำหนดให้ทุกโรงเรียนจัดทำแผนป้องกัน มีขั้นตอนรับแจ้งเหตุ สอบสวน และดูแลทั้งผู้ถูกกระทำและผู้กระทำ โดยห้ามการกลั่นแกล้งทั้งทางร่างกาย วาจา สังคม และไซเบอร์ ทั้งนี้เชื่อมโยงกับพระราชบัญญัติคุ้มครองเด็ก พ.ศ. 2546"
    links:
      - label: "ระเบียบ ศธ. ว่าด้วยการป้องกันการกลั่นแกล้งในโรงเรียน พ.ศ. 2566"
        url: "laws/anti-bullying-moe-2566/"
      - label: "พ.ร.บ.คุ้มครองเด็ก พ.ศ. 2546"
        url: "laws/child-protect-2546/"

  - group: "คำถามสำหรับผู้ปกครองและนักเรียน"
    question: "นักเรียนที่มีความพิการมีสิทธิทางการศึกษาอย่างไร?"
    answer: "ตามพระราชบัญญัติการจัดการศึกษาสำหรับคนพิการ พ.ศ. 2551 คนพิการมีสิทธิได้รับการศึกษาโดยไม่เสียค่าใช้จ่ายตั้งแต่แรกเกิดหรือพบความพิการ มีแผนการจัดการศึกษาเฉพาะบุคคล (IEP) และสถานศึกษาต้องจัดสิ่งอำนวยความสะดวก สื่อ และบริการที่เหมาะสม สอดคล้องกับการห้ามเลือกปฏิบัติตามพระราชบัญญัติส่งเสริมและพัฒนาคุณภาพชีวิตคนพิการ พ.ศ. 2550"
    links:
      - label: "พ.ร.บ.การจัดการศึกษาสำหรับคนพิการ พ.ศ. 2551"
        url: "laws/disability-edu-2551/"
      - label: "พ.ร.บ.ส่งเสริมและพัฒนาคุณภาพชีวิตคนพิการ พ.ศ. 2550"
        url: "laws/disabled-welfare-2550/"

  - group: "คำถามสำหรับผู้ปกครองและนักเรียน"
    question: "โรงเรียนลงโทษนักเรียนได้แค่ไหน?"
    answer: "ระเบียบกระทรวงศึกษาธิการว่าด้วยการลงโทษนักเรียนและนักศึกษา พ.ศ. 2548 กำหนดโทษไว้ 4 ประเภท ได้แก่ ว่ากล่าวตักเตือน ทำทัณฑ์บน ตัดคะแนนความประพฤติ และทำกิจกรรมเพื่อปรับเปลี่ยนพฤติกรรม โดยห้ามลงโทษด้วยวิธีรุนแรงหรือทำให้เจ็บปวดทางร่างกายและจิตใจ และต้องไม่ขัดกับพระราชบัญญัติคุ้มครองเด็ก พ.ศ. 2546"
    links:
      - label: "ระเบียบ ศธ. ว่าด้วยการลงโทษนักเรียนและนักศึกษา พ.ศ. 2548"
        url: "laws/punishment-rule-2548/"
      - label: "พ.ร.บ.คุ้มครองเด็ก พ.ศ. 2546"
        url: "laws/child-protect-2546/"

  # ===== กลุ่มที่ 3: คำถามสำหรับครูและบุคลากรทางการศึกษา =====
  - group: "คำถามสำหรับครูและบุคลากรทางการศึกษา"
    question: "ทำไมครูต้องมีใบอนุญาตประกอบวิชาชีพ?"
    answer: "พระราชบัญญัติสภาครูและบุคลากรทางการศึกษา พ.ศ. 2546 กำหนดให้วิชาชีพครู ผู้บริหารสถานศึกษา และผู้บริหารการศึกษาเป็น “วิชาชีพควบคุม” จึงต้องมีใบอนุญาตประกอบวิชาชีพ โดยมีคุรุสภาเป็นองค์กรกำหนดมาตรฐานวิชาชีพ จรรยาบรรณ และพิจารณาออก พักใช้ หรือเพิกถอนใบอนุญาต"
    links:
      - label: "พ.ร.บ.สภาครูและบุคลากรทางการศึกษา พ.ศ. 2546"
        url: "laws/teacher-council-2546/"
      - label: "คู่มือ: กฎหมายวิชาชีพครู เรื่องพื้นฐานที่ควรรู้"
        url: "guides/teacher-professional-law-basics/"

  - group: "คำถามสำหรับครูและบุคลากรทางการศึกษา"
    question: "วิทยฐานะครูมีกี่ระดับ และเส้นทางความก้าวหน้าเป็นอย่างไร?"
    answer: "ตามพระราชบัญญัติระเบียบข้าราชการครูและบุคลากรทางการศึกษา พ.ศ. 2547 เส้นทางวิทยฐานะเริ่มจากครูผู้ช่วย ไปสู่ชำนาญการ ชำนาญการพิเศษ เชี่ยวชาญ และเชี่ยวชาญพิเศษ โดยมีคณะกรรมการข้าราชการครูและบุคลากรทางการศึกษา (ก.ค.ศ.) เป็นองค์กรกลางบริหารงานบุคคลและกำหนดหลักเกณฑ์"
    links:
      - label: "พ.ร.บ.ระเบียบข้าราชการครูและบุคลากรทางการศึกษา พ.ศ. 2547"
        url: "laws/teacher-civil-2547/"

  - group: "คำถามสำหรับครูและบุคลากรทางการศึกษา"
    question: "ครูมีหน้าที่อย่างไรเมื่อพบนักเรียนถูกทำร้ายหรือเสี่ยงถูกล่วงละเมิด?"
    answer: "พระราชบัญญัติคุ้มครองเด็ก พ.ศ. 2546 กำหนดให้ครูและผู้บริหารสถานศึกษามีหน้าที่รายงานหรือแจ้งเหตุเมื่อพบเด็กถูกทารุณกรรมหรือเสี่ยงต่อการถูกล่วงละเมิด และห้ามลงโทษเด็กด้วยวิธีรุนแรงหรือทารุณ โดยมีระบบพนักงานเจ้าหน้าที่คุ้มครองเด็กและสถานแรกรับรองรับ"
    links:
      - label: "พ.ร.บ.คุ้มครองเด็ก พ.ศ. 2546"
        url: "laws/child-protect-2546/"

  # ===== กลุ่มที่ 4: คำถามสำหรับผู้บริหารสถานศึกษา =====
  - group: "คำถามสำหรับผู้บริหารสถานศึกษา"
    question: "ผู้บริหารสถานศึกษาควรรู้กฎหมายเรื่องใดบ้าง?"
    answer: "ผู้บริหารสถานศึกษาควรเข้าใจโครงสร้างการบริหารราชการตามพระราชบัญญัติระเบียบบริหารราชการกระทรวงศึกษาธิการ พ.ศ. 2546 ควบคู่กับกฎหมายที่เกี่ยวกับการคุ้มครองเด็ก การบริหารงานบุคคล และการประกันคุณภาพ เว็บไซต์นี้มีคู่มือสรุปประเด็นสำคัญสำหรับผู้บริหารโดยเฉพาะ"
    links:
      - label: "คู่มือ: ผู้บริหารสถานศึกษาควรรู้กฎหมายเรื่องใดบ้าง"
        url: "guides/school-administrator-law-basics/"
      - label: "พ.ร.บ.ระเบียบบริหารราชการกระทรวงศึกษาธิการ พ.ศ. 2546"
        url: "laws/moe-admin-2546/"

  - group: "คำถามสำหรับผู้บริหารสถานศึกษา"
    question: "สถานศึกษาต้องดูแลข้อมูลส่วนบุคคลของนักเรียนตาม PDPA อย่างไร?"
    answer: "ตามพระราชบัญญัติคุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562 สถานศึกษาเป็นผู้ควบคุมข้อมูลส่วนบุคคลเมื่อเก็บข้อมูลนักเรียน บุคลากร หรือผู้ปกครอง ต้องขอความยินยอมก่อนเก็บ ใช้ หรือเปิดเผยข้อมูลที่ละเอียดอ่อน จัดทำนโยบายคุ้มครองข้อมูล และประเมินความเสี่ยงเมื่อใช้ระบบสารสนเทศ แอปพลิเคชัน หรือคลาวด์"
    links:
      - label: "พ.ร.บ.คุ้มครองข้อมูลส่วนบุคคล พ.ศ. 2562 (ที่เกี่ยวข้องกับสถานศึกษา)"
        url: "laws/pdpa-2562/"

  - group: "คำถามสำหรับผู้บริหารสถานศึกษา"
    question: "โรงเรียนต้องจัดระบบประกันคุณภาพการศึกษาหรือไม่?"
    answer: "ตามพระราชบัญญัติประกันคุณภาพการศึกษา พ.ศ. 2546 สถานศึกษาทุกแห่งต้องจัดระบบประกันคุณภาพภายในและเตรียมรับการประเมินภายนอกเป็นรอบ โดยผลการประเมินต้องเปิดเผยต่อสาธารณะเพื่อความโปร่งใสและการพัฒนาต่อเนื่อง"
    links:
      - label: "พ.ร.บ.ประกันคุณภาพการศึกษา พ.ศ. 2546"
        url: "laws/qa-edu-2546/"
