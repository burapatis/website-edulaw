baseURL = 'https://burapatis.github.io/website-edulaw/'
canonifyURLs = true
disableKinds = []
locale = 'th-th'
defaultContentLanguage = 'th'
title = 'กฎหมายการศึกษา'
enableRobotsTXT = true

[taxonomies]
  tag = 'tags'
  category = 'categories'
  agency = 'agencies'
  lawtype = 'lawtypes'
  audience = 'audiences'

[params]
  description = 'เว็บไซต์รวบรวมกฎหมายการศึกษาไทย สรุปอ่านง่าย แบบทดสอบ เส้นทางการเรียนรู้ และลิงก์แหล่งข้อมูลทางการ เพื่อการศึกษาและค้นคว้าเบื้องต้น'
  author = 'Boorapatis Ploysuwan'
  tagline = 'EDUCATION LAW HUB'
  ogImage = 'assets/feature-graphic.png'
  feedbackGithubIssuesNew = 'https://github.com/burapatis/website-edulaw/issues/new/choose'
  feedbackGoogleForm = 'https://forms.gle/1dYeBTHmC1HcrbRx6'
  version = '1.0.0-beta'
  release_status = 'Public Beta'
  # การยืนยันความเป็นเจ้าของกับเครื่องมือผู้ดูแลเว็บ (ใส่เฉพาะรหัสใน content ของ meta tag)
  googleSiteVerification = 'wMILLqrIT3tacGNLNlP30_oUf39tjLi_gkUcO0aAGTY'
  bingSiteVerification = ''
  # คำสำคัญเริ่มต้นของเว็บไซต์ (ใช้เมื่อหน้านั้นไม่มี keywords/tags ของตัวเอง)
  keywords = ['กฎหมายการศึกษา', 'พ.ร.บ.การศึกษาแห่งชาติ', 'กฎหมายครู', 'ใบประกอบวิชาชีพครู', 'วิทยฐานะ', 'เรียนฟรี', 'การศึกษาภาคบังคับ', 'คุ้มครองเด็ก', 'ราชกิจจานุเบกษา', 'คลังกฎหมายการศึกษา']

