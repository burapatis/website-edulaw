baseURL = 'https://burapatis.github.io/website-edulaw/'
canonifyURLs = true
disableKinds = []
locale = 'th-th'
defaultContentLanguage = 'th'
title = 'กฎหมายการศึกษา'
enableRobotsTXT = true

[taxonomies]
  tag = 'tags'
  category = 'categories'
  agency = 'agencies'
  lawtype = 'lawtypes'
  audience = 'audiences'

[params]
  description = 'เว็บไซต์รวบรวมกฎหมายการศึกษาไทย สรุปอ่านง่าย แบบทดสอบ เส้นทางการเรียนรู้ และลิงก์แหล่งข้อมูลทางการ เพื่อการศึกษาและค้นคว้าเบื้องต้น'
  author = 'Boorapatis Ploysuwan'
  tagline = 'EDUCATION LAW HUB'
  ogImage = 'assets/feature-graphic.png'

[sitemap]
  changefreq = 'weekly'
  priority = 0.5

[languages.th]
  label = 'ไทย'
  weight = 1
  title = 'กฎหมายการศึกษา'

[menu]
  [[menu.main]]
    name = 'หน้าแรก'
    url = '/'
    weight = 1
  [[menu.main]]
    name = 'คลังกฎหมาย'
    url = '/laws/'
    weight = 2
  [[menu.main]]
    name = 'สรุปกฎหมาย'
    url = '/summaries/'
    weight = 3
  [[menu.main]]
    name = 'คำถามที่พบบ่อย'
    url = '/faq/'
    weight = 4
  [[menu.main]]
    name = 'แบบทดสอบ'
    url = '/quiz/'
    weight = 5
  [[menu.main]]
    name = 'เกี่ยวกับเว็บไซต์'
    url = '/about/'
    weight = 6

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
