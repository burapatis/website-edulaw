    explanation: "ช่วยให้ผู้ใช้ทราบว่าข้อมูลได้รับการทบทวนครั้งล่าสุดเมื่อใด"
    category: "ความน่าเชื่อถือ"
    related_url: "about/update-policy/"
    related_label: "อ่านนโยบายปรับปรุงข้อมูล"

  - id: public-beta
    term: "Public Beta"
    match: "สถานะเปิดใช้งานระยะแรกที่ยังรับข้อเสนอแนะและปรับปรุงต่อเนื่อง"
    explanation: "เว็บไซต์ยังพัฒนาต่อเนื่อง และยินดีรับข้อเสนอแนะจากผู้ใช้"
