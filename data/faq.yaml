# คำถามที่พบบ่อย (FAQ) — แหล่งข้อมูลเดียวสำหรับทั้งหน้าเว็บและ JSON-LD FAQPage
# answer ใช้ถ้อยคำปลอดภัยเพื่อการเรียนรู้ ไม่ใช่คำปรึกษากฎหมายเฉพาะกรณี
# links (ไม่บังคับ) แสดงเป็นลิงก์ "อ่านต่อ" ใต้คำตอบ; url เป็นเส้นทางสัมพัทธ์กับ baseURL หรือ URL เต็มภายนอก

items:
  - question: "กฎหมายการศึกษาแห่งชาติ คืออะไร?"
    answer: "เป็นกฎหมายแม่บทที่กำหนดหลักการ จุดมุ่งหมาย และโครงสร้างการจัดการศึกษาทั้งระบบของประเทศ ปัจจุบันบังคับใช้ตามพระราชบัญญัติการศึกษาแห่งชาติ พ.ศ. 2542 และฉบับแก้ไขเพิ่มเติม"
    links:
      - label: "พ.ร.บ.การศึกษาแห่งชาติ พ.ศ. 2542"
        url: "laws/nea-2542/"

  - question: "เว็บไซต์นี้รวบรวมกฎหมายได้ครบทุกฉบับหรือไม่?"
    answer: "ไม่ครับ คลังนี้คัดเลือกกฎหมายและระเบียบที่น่าสนใจและใช้งานบ่อยให้มากที่สุดเท่าที่จะทำได้ ยังมีกฎหมายอื่น ๆ ที่ไม่ได้รวมไว้ ควรตรวจสอบจากแหล่งทางการเพิ่มเติมเมื่อต้องใช้อ้างอิงจริง"

  - question: "เด็กมีสิทธิเรียนฟรีกี่ปี?"
    answer: "ตามรัฐธรรมนูญและกฎหมายการศึกษา รัฐต้องจัดให้เด็กได้รับการศึกษาอย่างมีคุณภาพเป็นเวลา 12 ปี โดยไม่เก็บค่าใช้จ่าย ในขณะที่การศึกษาภาคบังคับกำหนดไว้ 9 ปี"

  - question: "เนื้อหาในเว็บไซต์นี้ใช้อ้างอิงทางกฎหมายได้หรือไม่?"
    answer: "เนื้อหาเป็นการสรุปเพื่อการเรียนรู้ ไม่ใช่คำปรึกษาทางกฎหมาย ควรตรวจสอบฉบับเต็มจากราชกิจจานุเบกษา หรือหน่วยงานที่รับผิดชอบก่อนนำไปใช้งานจริง"
    links:
      - label: "ราชกิจจานุเบกษา"
        url: "https://ratchakitcha.soc.go.th"

  - question: "จะค้นหากฎหมายที่ต้องการได้อย่างไร?"
    answer: "ไปที่หน้าคลังกฎหมาย แล้วใช้การค้นหาหรือเลือกหมวดหมู่ที่เกี่ยวข้อง เช่น ครูและบุคลากร อุดมศึกษา หรือคุ้มครองเด็ก"
    links:
      - label: "คลังกฎหมาย"
        url: "laws/"
