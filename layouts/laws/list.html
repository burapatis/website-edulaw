{{ define "main" }}
{{- $data := site.Data.laws -}}
<div class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="{{ partial "iu.html" "" }}">หน้าแรก</a> / คลังกฎหมาย</div>
    <h1>{{ .Title }}</h1>
    <p>{{ .Description }}</p>
  </div>
</div>

<section style="padding-top:46px;">
  <div class="container">
    <div class="law-toolbar">
      <input type="search" id="searchInput" placeholder="พิมพ์ชื่อกฎหมาย หน่วยงาน หรือคำสำคัญ เช่น วิทยฐานะ, เรียนฟรี, คุรุสภา...">
      <div class="chip-row" id="chipRow">
        <button type="button" class="chip active" data-cat="">ทั้งหมด</button>
        {{- range $data.categories }}
        <button type="button" class="chip" data-cat="{{ .key }}">{{ .label }}</button>
        {{- end }}
      </div>
    </div>
    <div class="law-meta-row">
      <span class="result-count" id="resultCount"></span>
      <select id="sortSelect">
        <option value="default">เรียงตามลำดับหมวดหมู่</option>
        <option value="az">เรียงตามชื่อ (ก–ฮ)</option>
        <option value="year">เรียงตามปี (ใหม่ไปเก่า)</option>
      </select>
    </div>
    <script type="application/json" id="lawsCatalog">{{ $data | jsonify | safeJS }}</script>
    <div class="law-grid" id="lawGrid" data-law-base="{{ partial "iu.html" "laws/" }}"></div>
    <noscript>
      <div class="law-grid" style="margin-top:16px;">
        {{- range $data.laws }}
        <a class="law-card law-card--{{ .category }}" href="{{ partial "iu.html" (printf "laws/%s/" .id) }}">
          <div class="law-card-top">
            <span class="law-tag{{ if ne .status "บังคับใช้" }} is-draft{{ end }}">{{ .type }}</span>
            <span class="law-year">{{ index (split .year "·") 0 }}</span>
          </div>
          <h3>{{ .title }}</h3>
          <p class="law-summary">{{ .summary }}</p>
        </a>
        {{- end }}
      </div>
    </noscript>
  </div>
</section>
{{ end }}

{{ define "scripts" }}
<script src="{{ partial "iu.html" "js/laws-browser.js" }}"></script>
{{ end }}
